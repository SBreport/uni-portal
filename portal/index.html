<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유앤아이의원 통합 관리 시스템</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1e293b;
    }
    .container {
      text-align: center;
      max-width: 420px;
      padding: 48px 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 48px;
    }
    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 240px;
      margin: 0 auto;
      padding: 32px 24px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      background: #1e40af;
      color: #ffffff;
      border: 1px solid #1e40af;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(30, 64, 175, 0.25);
    }
    .btn-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .btn-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .btn-desc {
      font-size: 12px;
      opacity: 0.8;
    }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>유앤아이의원</h1>
    <p class="subtitle">통합 관리 시스템</p>

    <a href="/" class="btn" id="btn-enter">
      <span class="btn-icon">⚡</span>
      <span class="btn-title">시스템 접속</span>
      <span class="btn-desc">FastAPI + Vue.js</span>
    </a>

    <p class="footer">Developed by smartbranding</p>
  </div>

  <script>
    const host = window.location.hostname;
    const protocol = window.location.protocol;
    document.getElementById('btn-enter').href = `${protocol}//${host}:8080`;
  </script>
</body>
</html>
